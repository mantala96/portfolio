services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cms_db
      POSTGRES_INITDB_ARGS: "--locale=cs_CZ.UTF-8 --encoding=UTF8"
      LANG: cs_CZ.UTF-8
      LC_ALL: cs_CZ.UTF-8
    volumes:
      - /docker/volumes/postgres:/var/lib/postgresql/18/docker
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_app -d cms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio

  cms:
    image: ghcr.io/${GITHUB_USERNAME}/portfolio-cms:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cms_app:${POSTGRES_PASSWORD}@postgres:5432/cms_db
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${CMS_URL}
      NEXT_PUBLIC_WEBSITE_URL: ${WEBSITE_URL}
      CMS_SERVER_URL: ${CMS_URL}
      CMS_WEBSITE_URL: ${WEBSITE_URL}
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    networks:
      - portfolio

  frontend:
    image: ghcr.io/${GITHUB_USERNAME}/portfolio-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - cms
    networks:
      - portfolio

  nginx:
    image: ghcr.io/${GITHUB_USERNAME}/portfolio-nginx:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - cms
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      CMS_DOMAIN: ${CMS_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    volumes:
      - /docker/volumes/letsencrypt:/etc/letsencrypt
      - /docker/volumes/certbot_webroot:/var/www/certbot
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
