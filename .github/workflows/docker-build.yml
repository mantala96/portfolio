name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-cms:
    name: Build & push CMS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./cms
          target: runner
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/portfolio-cms:latest
            ghcr.io/${{ env.OWNER }}/portfolio-cms:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=${{ secrets.CMS_URL }}
            NEXT_PUBLIC_WEBSITE_URL=${{ secrets.WEBSITE_URL }}

  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/portfolio-frontend:latest
            ghcr.io/${{ env.OWNER }}/portfolio-frontend:${{ github.sha }}
          build-args: |
            VITE_CMS_URL=${{ secrets.CMS_URL }}

  build-nginx:
    name: Build & push nginx
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/portfolio-nginx:latest
            ghcr.io/${{ env.OWNER }}/portfolio-nginx:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-cms, build-frontend, build-nginx]
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /docker/volumes/postgres /docker/volumes/letsencrypt /docker/volumes/certbot_webroot
            cd /docker/portfolio
            IMAGE_TAG=${{ github.sha }} docker compose pull
            IMAGE_TAG=${{ github.sha }} docker compose up -d
            docker image prune -f
