events {
    worker_connections 1024;
}

http {
    # ── HTTP → HTTPS redirect + certbot challenge ──────────────────────────
    server {
        listen 80;
        server_name michalantala.cz cms.michalantala.cz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend (michalantala.cz) ───────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name michalantala.cz;

        ssl_certificate     /etc/letsencrypt/live/michalantala.cz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/michalantala.cz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── CMS (cms.michalantala.cz) ────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name cms.michalantala.cz;

        ssl_certificate     /etc/letsencrypt/live/cms.michalantala.cz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cms.michalantala.cz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Allow large media uploads
        client_max_body_size 100M;

        location / {
            proxy_pass         http://cms:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
